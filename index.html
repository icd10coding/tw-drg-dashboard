<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Tw-DRG 3.4 智能查詢與統計系統</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f5f7f9; padding: 20px; color: #333; margin: 0; }
        .container { max-width: 1400px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 15px; margin-bottom: 25px;}
        
        .filter-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; background: #fcfcfc; padding: 20px; border: 1px solid #eee; border-radius: 8px; margin-bottom: 20px; }
        .filter-group { display: flex; flex-direction: column; }
        .filter-group label { font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #34495e; }
        .filter-group input, .filter-group select { padding: 10px; border: 1px solid #cbd5e0; border-radius: 6px; font-size: 14px; transition: border 0.2s;}
        .filter-group input:focus, .filter-group select:focus { outline: none; border-color: #3498db; }
        .flex-row { display: flex; gap: 5px; }
        .flex-row input { width: 100%; }

        .btn-box { text-align: center; margin-bottom: 30px; }
        .btn-generate { padding: 15px 50px; background: #3498db; color: white; border: none; border-radius: 30px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(52,152,219,0.3);}
        .btn-generate:hover { background: #2980b9; transform: translateY(-2px); }

        .stat-panel { display: none; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; background: #e8f4fd; padding: 20px; border-radius: 8px; text-align: center; border-left: 5px solid #3498db; }
        .stat-item h3 { margin: 0; font-size: 15px; color: #7f8c8d; }
        .stat-item p { margin: 10px 0 0; font-size: 26px; font-weight: bold; color: #2c3e50; }
        .stat-highlight { color: #e74c3c !important; }

        .table-container { overflow-x: auto; max-height: 600px; border: 1px solid #eee; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; }
        th, td { padding: 12px 15px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
        th { background: #2c3e50; color: white; position: sticky; top: 0; z-index: 10; white-space: nowrap; }
        tr:hover { background-color: #f7fafc; }
        .dept-P { color: #d35400; background: #fff5eb; font-weight: bold; text-align: center; }
        .dept-M { color: #27ae60; background: #ebfaf0; font-weight: bold; text-align: center; }
        .empty-msg { text-align: center; color: #e74c3c; font-weight: bold; padding: 30px; font-size: 16px;}
    </style>
</head>
<body>
<div class="container">
    <h1>🏥 Tw-DRG 3.4 智能查詢與統計系統</h1>
    
    <div class="filter-panel">
        <div class="filter-group">
            <label>MDC 分類 (下拉選單)</label>
            <select id="f_mdc"><option value="ALL">全部 MDC</option></select>
        </div>
        <div class="filter-group">
            <label>DRG 代碼 (精確比對)</label>
            <input type="text" id="f_drg" placeholder="輸入完整代碼 (如: 00101)">
        </div>
        <div class="filter-group">
            <label>中文名稱 (支援模糊比對)</label>
            <input type="text" id="f_name" placeholder="輸入關鍵字 (如: 骨折)">
        </div>
        <div class="filter-group">
            <label>科系</label>
            <select id="f_dept">
                <option value="ALL">全部科系</option>
                <option value="P">外科系 (P)</option>
                <option value="M">內科系 (M)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>階段</label>
            <select id="f_phase">
                <option value="ALL">全部階段</option>
                <option value="第一階段">第一階段</option>
                <option value="第二階段">第二階段</option>
            </select>
        </div>
        <div class="filter-group">
            <label>是否上線</label>
            <select id="f_online">
                <option value="ALL">全部狀態</option>
                <option value="是">是 (已上線)</option>
                <option value="否">否 (未上線)</option>
            </select>
        </div>
        <div class="filter-group">
            <label>權重 (RW) 區間 (精確)</label>
            <div class="flex-row">
                <input type="number" id="f_rw_min" step="0.0001" placeholder="最小值">
                <input type="number" id="f_rw_max" step="0.0001" placeholder="最大值">
            </div>
        </div>
        <div class="filter-group">
            <label>虛擬 RW 區間 (精確)</label>
            <div class="flex-row">
                <input type="number" id="f_vrw_min" step="0.0001" placeholder="最小值">
                <input type="number" id="f_vrw_max" step="0.0001" placeholder="最大值">
            </div>
        </div>
        <div class="filter-group">
            <label>幾何平均住院日區間 (精確)</label>
            <div class="flex-row">
                <input type="number" id="f_los_min" placeholder="最小值">
                <input type="number" id="f_los_max" placeholder="最大值">
            </div>
        </div>
    </div>

    <div class="btn-box">
        <button class="btn-generate" onclick="generateReport()">📊 生成報表</button>
    </div>

    <div id="statPanel" class="stat-panel">
        <div class="stat-item"><h3>符合條件總筆數</h3><p id="s_total">-</p></div>
        <div class="stat-item"><h3>平均權值 (RW)</h3><p id="s_avg" class="stat-highlight">-</p></div>
        <div class="stat-item"><h3>科別比例 (外 P : 內 M)</h3><p id="s_ratio">-</p></div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>MDC</th><th>DRG</th><th>中文名稱</th><th>科別</th>
                    <th>權重 (RW)</th><th>虛擬 RW</th><th>幾何住院日</th><th>階段</th><th>是否上線</th>
                </tr>
            </thead>
            <tbody id="tbody">
                <tr><td colspan="9" class="empty-msg" style="color:#7f8c8d;">請設定條件並點擊上方「生成報表」按鈕</td></tr>
            </tbody>
        </table>
    </div>
</div>

    const mdcSel = document.getElementById('f_mdc');
    mdcList.forEach(m => {
        let opt = document.createElement('option');
        opt.value = m; 
        opt.textContent = m;
        mdcSel.appendChild(opt);
    });

    function generateReport() {
        const f_mdc = document.getElementById('f_mdc').value;
        const f_drg = document.getElementById('f_drg').value.trim().toUpperCase();
        const f_name = document.getElementById('f_name').value.trim().toLowerCase();
        const f_dept = document.getElementById('f_dept').value;
        const f_phase = document.getElementById('f_phase').value;
        const f_online = document.getElementById('f_online').value;
        
        const rw_min = parseFloat(document.getElementById('f_rw_min').value);
        const rw_max = parseFloat(document.getElementById('f_rw_max').value);
        const vrw_min = parseFloat(document.getElementById('f_vrw_min').value);
        const vrw_max = parseFloat(document.getElementById('f_vrw_max').value);
        const los_min = parseInt(document.getElementById('f_los_min').value);
        const los_max = parseInt(document.getElementById('f_los_max').value);

        // 篩選邏輯
        const results = db.filter(d => {
            // 1. 選單：精確比對
            if (f_mdc !== 'ALL' && d.mdc !== f_mdc) return false;
            if (f_dept !== 'ALL' && d.dept !== f_dept) return false;
            if (f_phase !== 'ALL' && d.phase !== f_phase) return false;
            if (f_online !== 'ALL' && d.isOnline !== f_online) return false;
            
            // 2. DRG代碼：精確比對 (===)
            if (f_drg !== '' && d.drg !== f_drg) return false;
            
            // 3. 中文名稱：模糊比對 (includes)
            if (f_name !== '' && !d.name.toLowerCase().includes(f_name)) return false;
            
            // 4. 數值區間：精確比較
            if (!isNaN(rw_min) && d.rw < rw_min) return false;
            if (!isNaN(rw_max) && d.rw > rw_max) return false;
            
            if (!isNaN(vrw_min) && d.vrw < vrw_min) return false;
            if (!isNaN(vrw_max) && d.vrw > vrw_max) return false;
            
            if (!isNaN(los_min) && d.los < los_min) return false;
            if (!isNaN(los_max) && d.los > los_max) return false;
            
            return true;
        });

        updateUI(results);
    }

    function updateUI(data) {
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        
        if (data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="9" class="empty-msg">⚠️ 找不到符合條件的資料，請嘗試放寬篩選條件。</td></tr>';
            document.getElementById('statPanel').style.display = 'none';
            return;
        }
        
        let sumRw = 0, pCount = 0, mCount = 0;
        
        // 生成表格內容
        data.forEach(d => {
            sumRw += d.rw;
            if(d.dept === 'P') pCount++;
            if(d.dept === 'M') mCount++;

            const deptClass = d.dept === 'P' ? 'dept-P' : (d.dept === 'M' ? 'dept-M' : '');
            
            let tr = `<tr>
                <td>${d.mdc}</td>
                <td><strong>${d.drg}</strong></td>
                <td>${d.name}</td>
                <td class="${deptClass}">${d.dept}</td>
                <td>${d.rw.toFixed(4)}</td>
                <td>${d.vrw.toFixed(4)}</td>
                <td>${d.los}</td>
                <td>${d.phase}</td>
                <td>${d.isOnline}</td>
            </tr>`;
            tbody.innerHTML += tr;
        });

        // 顯示並更新統計數據
        document.getElementById('statPanel').style.display = 'grid';
        document.getElementById('s_total').textContent = data.length + ' 筆';
        
        const avgRw = data.length > 0 ? (sumRw / data.length) : 0;
        document.getElementById('s_avg').textContent = avgRw.toFixed(4);
        
        // 科別比例計算
        const ratioP = data.length > 0 ? ((pCount / data.length) * 100).toFixed(1) : 0;
        const ratioM = data.length > 0 ? ((mCount / data.length) * 100).toFixed(1) : 0;
        document.getElementById('s_ratio').textContent = `P ${ratioP}% : M ${ratioM}%`;
    }
